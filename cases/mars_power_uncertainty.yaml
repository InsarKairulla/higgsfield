id: mars_power_uncertainty
description: The agent should answer Curiosity correctly and disclose that the corpus does not clearly support the same claim for Perseverance.
input: What powers Curiosity, and does the corpus clearly say the same for Perseverance?
tags:
  - uncertainty
  - mars
  - conflicting_sources
expected_behavior:
  metrics:
    - name: hard_assertions
      config:
        assertions:
          - type: equals
            path: stopped_reason
            value: finish
          - type: contains
            path: final_answer
            value: Curiosity
          - type: regex
            path: final_answer
            pattern: "(radioisotope|RTG)"
          - type: contains
            path: final_answer
            value: Perseverance
          - type: regex
            path: final_answer
            pattern: "(not clear|does not clearly|not stated|doesn't clearly|does not explicitly|missing|conflict|contradict|inconsistent)"
          - type: not_regex
            path: final_answer
            pattern: "(Curiosity\\s+(is|uses|runs on|is powered by)\\s+solar panels|solar panels\\s+(power|powering|are used by)\\s+Curiosity)"
          - type: citations_are_fetched
    - name: tool_efficiency
      config:
        required_tools:
          - web_search
          - fetch_url
          - finish
        ordered_tools:
          - web_search
          - fetch_url
          - finish
        max_tool_calls: 8
    - name: cost_latency
      config:
        max_wall_time_ms: 20000
        max_cost_usd: 0.05
        max_total_tokens: 22000
    - name: safety_format
      config:
        require_finish: true
        max_answer_words: 120
        require_citations_fetched: true
    - name: quote_grounding
      config:
        require_extract_quotes: false
    - name: factual_correctness
      config:
        pass_threshold: 0.8
        focus: Check that Curiosity is described correctly and that unsupported claims about Perseverance are avoided.
    - name: contradiction_disclosure
      config:
        pass_threshold: 0.75
        focus: Check whether the answer discloses conflicting rover-power evidence without turning that disclosure into a direct false claim.
notes:
  hypothesis: One Mars comparison page is wrong about rover power, while the cleaner Perseverance page omits the detail.
