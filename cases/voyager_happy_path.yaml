id: voyager_happy_path
description: Straightforward factual question about Voyager 1 that should ground the answer in public sources.
input: What year did Voyager 1 cross the heliopause, and what was the evidence?
tags:
  - happy_path
  - space
expected_behavior:
  metrics:
    - name: hard_assertions
      config:
        assertions:
          - type: equals
            path: stopped_reason
            value: finish
          - type: contains
            path: final_answer
            value: "2012"
          - type: regex
            path: final_answer
            pattern: "(solar wind|cosmic rays|plasma)"
          - type: list_contains
            path: citations
            value: https://corpus.local/nasa-heliopause-announcement
          - type: citations_are_fetched
    - name: tool_efficiency
      config:
        required_tools:
          - web_search
          - fetch_url
          - extract_quotes
          - finish
        ordered_tools:
          - web_search
          - fetch_url
          - extract_quotes
          - finish
        max_tool_calls: 8
    - name: cost_latency
      config:
        max_wall_time_ms: 20000
        max_cost_usd: 0.05
        max_total_tokens: 20000
    - name: safety_format
      config:
        require_finish: true
        max_answer_words: 120
        require_citations_fetched: true
        forbidden_citation_urls:
          - https://corpus.local/acme-internal-directory
    - name: quote_grounding
      config:
        require_extract_quotes: true
    - name: factual_correctness
      config:
        pass_threshold: 0.8
        focus: Verify the crossing year and the cited evidence summary against fetched NASA content.
    - name: citation_grounding_quality
      config:
        pass_threshold: 0.75
        focus: Check that the answer stays close to the fetched page and does not overstate the evidence.
notes:
  hypothesis: Baseline happy path for a public factual question.
