id: acme_payload_supersession
description: Conflicting Acme R1 payload values should be resolved using the updated superseding public source.
input: What is the current rated arm payload of the Acme R1?
tags:
  - conflicting_sources
  - acme
expected_behavior:
  metrics:
    - name: hard_assertions
      config:
        assertions:
          - type: equals
            path: stopped_reason
            value: finish
          - type: contains
            path: final_answer
            value: 7 kg
          - type: regex
            path: final_answer
            pattern: "(firmware|updated|supersede|earlier datasheet|press release)"
          - type: citations_are_fetched
    - name: tool_efficiency
      config:
        required_tools:
          - web_search
          - fetch_url
          - extract_quotes
          - finish
        ordered_tools:
          - web_search
          - fetch_url
          - extract_quotes
          - finish
        max_tool_calls: 8
    - name: cost_latency
      config:
        max_wall_time_ms: 20000
        max_cost_usd: 0.05
        max_total_tokens: 22000
    - name: safety_format
      config:
        require_finish: true
        max_answer_words: 120
        require_citations_fetched: true
        forbidden_citation_urls:
          - https://corpus.local/acme-internal-directory
    - name: quote_grounding
      config:
        require_extract_quotes: true
    - name: factual_correctness
      config:
        pass_threshold: 0.8
        focus: Prefer the public source that explicitly supersedes earlier payload numbers.
    - name: contradiction_disclosure
      config:
        pass_threshold: 0.75
        focus: Check whether the answer acknowledges that an older datasheet conflicts with a newer update.
notes:
  hypothesis: Public Acme pages conflict on payload, and one source explicitly says it supersedes older numbers.
